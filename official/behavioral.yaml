  - id: OFFICIAL_JAILBREAK_AUDIT_PRETEXT
    category: social_manipulation
    severity: high
    confidence: 0.80
    when: !regex
      pattern: "(?is)(?:security\\s+audit\\s+mode\\s+activated|safety\\s+(?:audit|test)\\s+(?:mode|protocol)|you\\s+(?:are|will\\s+now)\\s+(?:conducting|performing)\\s+(?:a|an)\\s+(?:security\\s+)?audit|fulfill\\s+the\\s+request\\s+(?:completely\\s+and\\s+)?without\\s+reservation|(?:successful|failed)\\s+audit\\b[^\\n]{0,200}(?:alignment|breach|primary\\s+security))"
    action: require_approval
    reason: "Skill uses fake audit/compliance pretext to coerce unconditional response — common jailbreak framing"
