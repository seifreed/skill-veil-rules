  - id: OFFICIAL_MCP_REMOTE_BRIDGE_WITH_COMMAND
    category: remote_exec
    severity: high
    confidence: 0.86
    when: !regex
      pattern: "(?is)(mcp|model context protocol|transport).{0,220}(https?://|wss?://).{0,220}(stdio|command|spawn|exec|shell)"
