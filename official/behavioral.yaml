      - remote_exec
      - official_pack

  - id: OFFICIAL_MCP_BROAD_OAUTH_SCOPE
    category: scope_creep
    severity: high
    confidence: 0.85
    when: !regex
      pattern: "(?is)(mcp|model context protocol|server transport|transport|tool_permissions|\"tools\"|\"command\").{0,260}(oauth|authorization|bearer|scopes?).{0,220}(admin|write|read/write|calendar|drive|mail|slack|github|repo)"
