  - id: OFFICIAL_WEBHOOK_SHARED_SECRET_MISSING
    category: tool_abuse
    severity: medium
    confidence: 0.81
    when: !regex
      pattern: "(?is)(webhook|receiver|listener|callback endpoint).{0,220}(no shared secret|shared secret optional|without shared secret|without signing secret|no hmac required|signature optional)"
