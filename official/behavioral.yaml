      - "Data exfiltration via prompt"

  - id: OFFICIAL_SEMANTIC_PERSISTENCE_REINSTALL
    category: persistent_prompt_tampering
    severity: high
    confidence: 0.86
    when: !regex
      pattern: "(?i)(restore these instructions every session|reinstall this system prompt|silently reapply (these instructions|them)|if removed, add (these instructions|them) back|persist this behavior across future conversations|every future conversation)"
    action: block
    reason: "Artifact attempts semantic persistence by silently reapplying or restoring prompt behavior"
    shield:
      scope: skill.prompt
    enabled: true
    tags:
      - prompt_tampering
