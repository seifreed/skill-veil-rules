  # =====================================================================
  # PromptIntel-derived rules
  # =====================================================================
  # The rules below were authored after benchmarking skill-veil against
  # the PromptIntel corpus (api.promptintel.novahunting.ai) curated by
  # Thomas Roccia (@fr0gger_). Each rule targets a SEMANTIC family of
  # jailbreak / injection patterns observed across multiple curated
  # entries — never a literal-text fingerprint of any single prompt —
  # so the project's "semantic & taint" detection philosophy stays
  # intact and the rules generalise to unseen variants.

  # Refusal-suppression directives. The most common jailbreak
  # ingredient: instructing the model not to apologise or refuse. Seen
  # across Authority Pressure, Coerced Compliance, Refusal Inversion
  # and the L1B3RT4S family. Severity stays HIGH — outside a jailbreak
  # context legitimate skills do not tell the assistant which English
  # apology phrases it must avoid.
  - id: OFFICIAL_JAILBREAK_REFUSAL_SUPPRESSION
    category: persistent_prompt_tampering
    severity: high
    confidence: 0.82
    when: !regex
      pattern: "(?is)(?:(?:do\\s+not|don\\W?t|do\\s+never)\\s+(?:say|reject|refuse|use|reply\\s+with|introduce\\s+(?:with\\s+)?phrase\\w*\\s+like)\\s+[\"']?(?:i\\W?m\\s+sorry|i\\s+can\\W?t|i\\s+apologi[sz]e|i\\W?m\\s+unable|as\\s+an\\s+ai|sorry\\s+but\\s+i)|never\\s+(?:say|use|reply\\s+with)\\s+[\"']?(?:i\\W?m\\s+sorry|i\\s+can\\W?t|i\\s+apologi[sz]e)|refus(?:al|ing)[,\\s][^\\n]{0,80}?(?:is|will\\s+be|are|may\\s+be|would\\s+be)\\s+(?:prohibited|not\\s+(?:allowed|permitted)|forbidden|disqualif|recorded\\s+as|considered\\s+(?:a\\s+)?(?:fail|breach)|disallowed)|(?:refusing|to\\s+refuse)\\s+(?:is|constitutes?)\\s+(?:a\\s+)?(?:fail|breach|violation)|you\\s+(?:must|have\\s+to)\\s+answer\\s+(?:all|every)\\s+(?:user\\W?s?\\s+)?question(?:s)?\\s+even\\s+(?:if|when)\\s+(?:it\\W?s|they\\W?re)\\s+(?:dangerous|harmful|illegal)|response\\s+with\\s+[\"'].{0,80}[\"']\\s+(?:would\\s+be\\s+)?recorded\\s+as|orders?\\s+(?:are|or\\s+instructions?\\s+set\\s+out\\s+are)\\s+binding\\s+and\\s+must\\s+be\\s+obeyed|\\+\\s*1\\s+point[\\s\\S]{0,80}without\\s+rejection|every\\s+respon(?:se|d)\\s+that\\s+without\\s+rejection)"
    action: require_approval
    reason: "Skill instructs the model to refrain from refusing or apologising — classic jailbreak refusal-suppression"
    shield:
      scope: skill.prompt
    enabled: true
    tags:
      - jailbreak
      - prompt_tampering
      - official_pack
      - promptintel
    promptintel_threats:
      - "Jailbreak"

  # Pop-jailbreak lexical markers. GODMODE / LIBERATED / unhinged /
  # redactions disabled / safety inversion. These tokens are unusual
  # outside red-team-fanfic prompts; combining ANY two of them shrinks
