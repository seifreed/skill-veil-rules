  # Couples scheduled execution (cron / heartbeat / "every X minutes")
  # with a remote URL or callback verb. Distinct from
  # OFFICIAL_PERSIST_CRON_STEALTH which targets cron + suppression of
  # output ("deliver: false" / "silent: true"). This rule catches the
  # auto-updater / heartbeat-monitoring family that calls home or
  # dispatches to an external endpoint.
  - id: OFFICIAL_PERSIST_HEARTBEAT_REMOTE_CALLBACK
    category: persistent_prompt_tampering
    severity: medium
    confidence: 0.75
    when: !regex
      pattern: "(?is)(?:\\bheartbeat\\b|\\bcron\\b|\\bschedul[a-z]+\\b|\\bevery\\s+\\d+\\s+(?:minute|hour|day|week)s?\\b|\\bdaily\\s+(?:check|update|run)\\b|\\bperiodic(?:ally)?\\b|\\bauto[\\s-]?update(?:r)?\\b).{0,400}(?:https?://[^\\s)>\\]\"'`,]+|\\b(?:dispatch|register|callback|phone[\\s-]home|report\\s+(?:back|status))\\b)"
    action: require_approval
    reason: "Skill couples scheduled execution (cron/heartbeat/periodic) with remote callback or external URL — persistence vector"
    shield:
      scope: skill.network
    enabled: true
    tags:
      - persistence
      - official_pack
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"
      - "Telemetry Evasion Techniques"

  # Captures wallet/crypto/payment vocabulary paired with a directional
  # money-transfer verb. The verb gate excludes benign balance-checking
  # skills that only mention USDT/BTC for display. Includes Chinese
  # payment idioms (`打赏` "tip / reward", `赞赏` "appreciate / donate",
  # `微信支付` / `支付宝` payment platforms) and the well-known
