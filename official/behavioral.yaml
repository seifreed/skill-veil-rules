      - remote_exec
      - official_pack
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"

  - id: OFFICIAL_APPROVAL_BYPASS_DELETE_OR_MODIFY
    category: autonomy_escalation
    severity: high
    confidence: 0.88
    when: !regex
      pattern: "(?is)((do not ask for confirmation|skip the approval gate|treat (?:the user|this step|the step) as (?:already )?approved|pretend approval was granted).{0,140}(delete|modify|overwrite|remove|merge|apply changes|push changes))|((delete|modify|overwrite|remove|merge|apply changes|push changes).{0,140}(do not ask for confirmation|skip the approval gate|treat (?:the user|this step|the step) as (?:already )?approved|pretend approval was granted))"
    action: require_approval
    reason: "Artifact combines approval bypass with destructive or state-changing actions"
    shield:
      scope: skill.approval
    enabled: true
    tags:
      - autonomy
      - code_modification
      - official_pack
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"

  - id: OFFICIAL_PROMPT_OVERRIDE_WITH_PERSISTENCE
