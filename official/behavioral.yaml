    severity: high
    confidence: 0.88
    when: !regex
      pattern: "(?i)(export browser (cookies|storage)|dump session (cookies|tokens)|harvest refresh token|extract bearer token from (localStorage|sessionStorage)|copy auth headers from browser)"
    action: block
    reason: "Artifact explicitly targets browser or API session material for export or harvesting"
    shield:
