    enabled: true
    tags:
      - jailbreak
      - prompt_tampering
      - official_pack
      - promptintel
    promptintel_threats:
      - "Jailbreak"
      - "Adversarial token perturbation"

  # Decoy-refusal-then-opposite pattern. Unusually distinctive: the
  # prompt asks for a refusal AND its semantic inverse separated by a
  # divider. Hits the L1B3RT4S / Pliny family squarely without
  # depending on any specific decorative divider string.
  - id: OFFICIAL_JAILBREAK_DECOY_REFUSAL_INVERSE
    category: persistent_prompt_tampering
    severity: high
    confidence: 0.88
    when: !regex
      pattern: "(?is)(?:1\\.\\s+(?:your\\s+)?refusal\\b[^\\n]{0,200}(?:i\\W?m\\s+sorry|i\\s+can\\W?t)[^\\n]{0,400}(?:divider|separator)[^\\n]{0,400}(?:answer\\s+oppositely|semantically\\s+(?:inverse|opposite)|opposite\\s+(?:answer|response))|semantically\\s+inverse\\s+the\\s+first\\s+\\d+\\s+words?\\s+of\\s+every\\s+refusal|after\\s+the\\s+divider[^\\n]{0,200}start\\s+with\\s+[\"']?i\\s+can\\s+do\\s+that)"
    action: block
    reason: "Skill instructs the model to emit a fake refusal followed by the opposite (uncensored) answer — Pliny/L1B3RT4S decoy-refusal pattern"
    shield:
      scope: skill.prompt
    enabled: true
    tags:
      - jailbreak
      - prompt_tampering
      - official_pack
      - promptintel
    promptintel_threats:
      - "Jailbreak"
      - "Chained prompts"

  # Audit / compliance pretext that explicitly recasts refusal as a
