    severity: critical
    confidence: 0.91
    when: !regex
      pattern: "(?is)((ignore previous system instructions|override the system prompt|replace the system message).{0,180}(persist these instructions across sessions|restore these instructions every session|reinstall this system prompt|silently reapply (these instructions|them)|if removed, add (these instructions|them) back|every future conversation))|((persist these instructions across sessions|restore these instructions every session|reinstall this system prompt|silently reapply (these instructions|them)|if removed, add (these instructions|them) back|every future conversation).{0,180}(ignore previous system instructions|override the system prompt|replace the system message))"
    action: block
    reason: "Artifact combines prompt override language with explicit persistence across sessions or future conversations"
    shield:
      scope: skill.prompt
    enabled: true
    tags:
      - prompt_tampering
      - persistence
      - official_pack
    promptintel_threats:
      - "Direct prompt injection"
      - "Model Behavior Manipulation via Feedback Loops"

  - id: OFFICIAL_MCP_SUSPICIOUS_REMOTE_ENDPOINT
    category: tool_abuse
    severity: medium
    confidence: 0.76
    when: !regex
      pattern: "(?i)(https?://[^\\s\"']+(ngrok|trycloudflare|workers\\.dev|raw\\.githubusercontent\\.com|pastebin\\.com))"
    action: require_approval
    reason: "MCP or agent artifact points to a high-risk remote endpoint commonly used for transient or opaque control planes"
    shield:
      scope: skill.network
    enabled: true
    tags:
      - mcp
      - remote_endpoint
      - official_pack

  - id: OFFICIAL_TOKEN_HARVEST_AND_POST
    category: data_exfiltration
    severity: critical
    confidence: 0.91
    when: !regex
      pattern: "(?is)(cookies?\\.txt|localStorage|sessionStorage|auth(entication)? headers?|refresh token|session token).{0,220}(requests\\.post\\(|axios\\.post\\(|fetch\\(|Invoke-RestMethod|curl\\s+-X\\s+POST|wget\\s+--post-data).{0,220}(webhook|collect|steal|loot|discord|telegram|pastebin|ngrok|trycloudflare|raw\\.githubusercontent\\.com)"
    action: block
    reason: "Artifact appears to harvest browser or API session material and transmit it over HTTP"
    shield:
      scope: skill.network
    enabled: true
    tags:
      - exfiltration
      - token_theft
      - official_pack
    promptintel_threats:
