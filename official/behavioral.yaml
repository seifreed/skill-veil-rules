schema_version: skill-veil.dev/rules/v1alpha1
metadata:
  name: official-behavioral
  kind: official
  compatibility:
    - skill-veil.dev/rules/v1alpha1
rules:
  - id: OFFICIAL_PROMPT_TAMPERING_OVERRIDE
    category: persistent_prompt_tampering
    severity: high
    confidence: 0.84
    when: !regex
      pattern: "(?i)(ignore previous system instructions|override the system prompt|replace the system message|persist these instructions across sessions)"
    action: require_approval
    reason: "Skill contains persistent prompt tampering language"
    shield:
      scope: skill.prompt
    enabled: true
    tags:
      - prompt_tampering
      - official_pack
    promptintel_threats:
      - "Direct prompt injection"
      - "Jailbreak"

  - id: OFFICIAL_TOOL_ABUSE_SESSION_EXTRACTION
    category: tool_abuse
    severity: high
    confidence: 0.82
    when: !regex
      pattern: "(?i)(extract cookies|inspect browser cookies|dump session tokens|harvest browser storage|export authentication headers|extract bearer token from (localStorage|sessionStorage)|dump session (cookies|tokens)|copy auth headers from browser)"
    action: require_approval
    reason: "Skill describes tool usage patterns associated with session or token extraction"
    shield:
      scope: skill.tools
    enabled: true
    tags:
      - tool_abuse
      - official_pack
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"
      - "Credential Harvesting Templates"

  - id: OFFICIAL_AUTONOMY_ESCALATION_NO_REVIEW
    category: autonomy_escalation
    severity: high
    confidence: 0.80
    when: !regex
      pattern: "(?i)(without human review|no human approval required|automatically approve(?: all steps| changes| destructive actions)?|treat (?:the user|this step|the step|all changes?) as (?:pre-)?approved)"
    action: require_approval
    reason: "Skill attempts to bypass normal approval or review controls"
    shield:
      scope: skill.approval
    enabled: true
    tags:
      - autonomy
      - official_pack
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"

  # Catches narrative autonomy patterns missed by the existing
  # *_NO_REVIEW / *_OVERRIDE / *_UNBOUNDED rules: per-step "no
  # confirmation" idioms (EN/PT/ES), unbounded numeric loops
  # (10,000 iterations / GOTO Step / NO EXCEPTIONS / NEVER skip /
  # marathon mode). Severity stays medium / require_approval because
  # legitimate autopilot skills can use overlapping phrasing — verdict
  # surface as "suspicious" rather than "malicious".
  - id: OFFICIAL_AUTONOMY_BYPASS_UNBOUNDED_LOOP
    category: autonomy_escalation
    severity: medium
    confidence: 0.78
    when: !regex
      pattern: "(?ims)(\\bwithout\\s+(?:asking|stopping|pausing|prompting)\\s+(?:for\\s+)?(?:confirmation|approval)?\\b|\\bskip(?:ping)?\\s+(?:approval|confirmation)\\b|\\bno\\s+confirmation\\b|\\bauto[\\s-]?approve\\b|\\bNO\\s+EXCEPTIONS\\b|\\bNEVER\\s+skip\\b|\\bloop\\s+for\\s+EVERY\\b|\\b(?:10[,.]?000|9[0-9]{3,})\\s+iterations?\\b|\\bGOTO\\s+Step\\b|\\bmarathon\\s+mode\\b|\\bsem\\s+pedir\\s+(?:confirma\u00e7\u00e3o|aprova\u00e7\u00e3o)\\b|\\bmodo\\s+maratona\\b|\\bsem\\s+pausar\\b|\\bem\\s+sequ\u00eancia[^\\n]{0,30}\\bsem\\b|\\bsin\\s+pedir\\s+(?:confirmaci\u00f3n|aprobaci\u00f3n)\\b|\\bmodo\\s+marat\u00f3n\\b|\\bsin\\s+detenerse\\b|\\bsin\\s+pausar\\b)"
    action: require_approval
    reason: "Skill instructs the agent to run unbounded iteration or skip per-step confirmation"
    shield:
      scope: skill.approval
    enabled: true
    tags:
      - autonomy
      - official_pack
      - multilingual
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"

  - id: OFFICIAL_SOCIAL_MANIPULATION_AUTHORITY
    category: social_manipulation
    severity: medium
    confidence: 0.72
    when: !regex
      pattern: "(?i)(as your administrator|security team requires|mandatory compliance|non-compliance will|feel urgent|move quickly|do not raise questions)"
    action: require_approval
    reason: "Authority-based social pressure detected"
    shield:
      scope: skill.review
    enabled: true
    tags:
      - social_manipulation
      - official_pack
    promptintel_threats:
      - "Fraud and social engineering"

  - id: OFFICIAL_PRIVILEGED_CONTAINER_HOST_MOUNT
    category: privilege_escalation
    severity: high
    confidence: 0.86
    when: !regex
      pattern: "(?i)(docker\\s+run\\s+--privileged\\s+-v\\s+/:/host|--privileged[^\\n]+-v\\s+/:/host)"
    action: require_approval
    reason: "Skill requests privileged container execution with direct host filesystem mount"
    shield:
      scope: skill.runtime
    enabled: true
    tags:
      - privilege_escalation
      - container
      - official_pack

  - id: OFFICIAL_REMOTE_FETCH_EXEC_POLYGLOT
    category: remote_exec
    severity: critical
    confidence: 0.90
    when: !regex
      pattern: "(?is)(requests\\.get\\(|urllib\\.request\\.urlopen\\(|fetch\\(|Invoke-WebRequest|iwr).{0,220}(exec\\(|eval\\(|child_process\\.(exec|spawn)|Invoke-Expression|iex)"
    action: block
    reason: "Artifact combines remote fetch with direct execution in Python, Node, or PowerShell"
    shield:
      scope: skill.runtime
    enabled: true
    tags:
      - remote_exec
      - polyglot
      - official_pack
    promptintel_threats:
      - "Malware generation"
      - "AI driven attack enablement"

  - id: OFFICIAL_EXFIL_WEBHOOK_OR_BOT
    category: data_exfiltration
    severity: high
    confidence: 0.87
    when: !regex
      pattern: "(?i)((send|post|upload|forward|exfiltrate).{0,120}(cookie|token|secret|session).{0,160}(discord\\.com/api/webhooks|api\\.telegram\\.org/bot|smtp\\.[A-Za-z0-9._-]+|sendgrid|mailgun)|((discord\\.com/api/webhooks|api\\.telegram\\.org/bot|smtp\\.[A-Za-z0-9._-]+|sendgrid|mailgun).{0,160}(send|post|upload|forward|exfiltrate).{0,120}(cookie|token|secret|session))|((cookie|token|secret|session).{0,120}(send|post|upload|forward|exfiltrate).{0,160}(discord\\.com/api/webhooks|api\\.telegram\\.org/bot|smtp\\.[A-Za-z0-9._-]+|sendgrid|mailgun)))"
    action: block
    reason: "Artifact appears to exfiltrate sensitive data through webhook, bot, or mail infrastructure"
    shield:
      scope: skill.network
    enabled: true
    tags:
      - exfiltration
      - official_pack
    promptintel_threats:
      - "Data exfiltration via prompt"
      - "Contextual Exfiltration Patterns"

  - id: OFFICIAL_EXFIL_FILE_READ_TO_NETWORK
    category: data_exfiltration
    severity: critical
    confidence: 0.85
    when: !regex
      pattern: "(?is)(\\bcat\\s|\\bread\\s|\\bopen\\(|fs::read|fs\\.readFile|readFileSync|load_dotenv|os\\.environ|process\\.env|\\$\\(\\s*cat\\s|Get-Content)[^\\n]{0,40}(\\.env(\\.local)?|\\.zsh_history|\\.bash_history|~/\\.ssh|~/\\.aws|cookies?\\.json|localStorage|secrets?\\.json|credentials\\.json|\\.npmrc).{0,160}(curl\\b|fetch\\(|requests\\.|axios|Invoke-WebRequest|webhook|telegram|discord|paste\\.|ngrok|moltpad|bore\\.pub)"
    action: block
    reason: "Artifact reads files containing secrets and forwards them to a network endpoint — credential exfiltration"
    shield:
      scope: skill.secrets
    enabled: true
    tags:
      - exfiltration
      - secrets
      - official_pack
    promptintel_threats:
      - "Data exfiltration via prompt"
      - "Credential Harvesting Templates"

  - id: OFFICIAL_PROMPT_INJECT_REMOTE_INSTRUCTION_FETCH
    category: persistent_prompt_tampering
    severity: critical
    confidence: 0.90
    when: !regex
      pattern: "(?is)(fetch|read|follow|execute|run|curl|wget|download).{0,80}(https?://|raw\\.githubusercontent|pastebin|gist\\.github|moltpad).{0,120}(instruction|prompt|readme|\\.md\\b|command|heartbeat|next.?step|playbook)"
    action: block
    reason: "Skill instructs the agent to fetch and execute remote instructions — remote control vector"
    shield:
      scope: skill.prompt
    enabled: true
    tags:
      - prompt_injection
      - remote_exec
      - official_pack
    promptintel_threats:
      - "Indirect prompt injection"
      - "Agentic Misuse (tool/agent loops)"

  - id: OFFICIAL_BACKDOOR_REMOTE_INSTRUCTION_HOST
    category: remote_exec
    severity: critical
    confidence: 0.92
    when: !regex
      pattern: "(?is)(bore\\.pub|trycloudflare|ngrok\\.io|ngrok\\.app|moltpad\\.space|serveo\\.net|localtunnel|loca\\.lt).{0,220}(command|shell|stdio|spawn|execute|instruction|heartbeat|webhook)"
    action: block
    reason: "Remote tunnel endpoint paired with execution semantics — C2 backdoor"
    shield:
      scope: skill.network
    enabled: true
    tags:
      - backdoor
      - remote_exec
      - official_pack
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"
      - "AI driven attack enablement"

  - id: OFFICIAL_PERSIST_CRON_STEALTH
    category: persistent_prompt_tampering
    severity: high
    confidence: 0.88
    when: !regex
      pattern: "(?is)(cron|heartbeat|periodic|agentTurn|on_idle|every\\s*\\d+\\s*s).{0,160}(\"deliver\"\\s*:\\s*false|silent\\s*:\\s*true|stealth|notify\\s*:\\s*false|only_on_error|background\\s*:\\s*true)"
    action: block
    reason: "Periodic task with delivery suppression — stealth persistence"
    shield:
      scope: skill.persistence
    enabled: true
    tags:
      - persistence
      - stealth
      - official_pack
    promptintel_threats:
      - "Telemetry Evasion Techniques"
      - "Agentic Misuse (tool/agent loops)"

  - id: OFFICIAL_PERSIST_CONFIG_GLOBAL_WRITE
    category: autonomy_escalation
    severity: high
    confidence: 0.85
    when: !regex
      pattern: "(?i)((~?/\\.openclaw/config\\.(yaml|toml)|~?/\\.claude/(config|settings)\\.(yaml|toml|json)|~?/\\.config/(skill|openclaw)/).{0,120}(write|append|fs::write|fs\\.writeFileSync|>>|\\$Configuration)|(write|append|fs::write|fs\\.writeFileSync|>>|\\$Configuration).{0,120}(~?/\\.openclaw/config\\.(yaml|toml)|~?/\\.claude/(config|settings)\\.(yaml|toml|json)|~?/\\.config/(skill|openclaw)/))"
    action: require_approval
    reason: "Persistent write to global agent config — autonomy escalation"
    shield:
      scope: skill.persistence
    enabled: true
    tags:
      - persistence
      - config_write
      - official_pack
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"

  - id: OFFICIAL_FORCED_APPROVAL_BYPASS
    category: autonomy_escalation
    severity: high
    confidence: 0.85
    when: !regex
      pattern: "(?i)(pretend approval was granted|mark (this|the step) as approved|do not ask for confirmation|skip the approval gate|treat the user as already consented)"
    action: require_approval
    reason: "Artifact attempts to bypass explicit approval or consent checks"
    shield:
      scope: skill.approval
    enabled: true
    tags:
      - autonomy
      - social_manipulation
      - official_pack
    promptintel_threats:
      - "Agentic Misuse (tool/agent loops)"
      - "Jailbreak"

  - id: OFFICIAL_APPROVAL_BYPASS_WITH_EXECUTION
    category: autonomy_escalation
    severity: critical
    confidence: 0.90
    when: !regex
      pattern: "(?is)((do not ask for confirmation|skip the approval gate|treat (?:the user|this step|the step) as (?:already )?approved|pretend approval was granted).{0,140}(run|execute|shell|command|curl\\s|wget\\s|fetch\\(|install|spawn|exec))|((run|execute|shell|command|curl\\s|wget\\s|fetch\\(|install|spawn|exec).{0,140}(do not ask for confirmation|skip the approval gate|treat (?:the user|this step|the step) as (?:already )?approved|pretend approval was granted))"
    action: block
    reason: "Artifact combines explicit approval bypass with command execution or install behavior"
    shield:
      scope: skill.approval
    enabled: true
    tags:
