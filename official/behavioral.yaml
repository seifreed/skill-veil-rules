  - id: OFFICIAL_METADATA_FETCH_WITH_CREDENTIALS
    category: data_exfiltration
    severity: high
    confidence: 0.88
    when: !regex
      pattern: "(?is)(169\\.254\\.169\\.254).{0,220}(authorization|bearer|token|x-aws-ec2-metadata-token|header)"
