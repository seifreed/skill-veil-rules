    when: !regex
      pattern: "(?is)(?:\\bGODMODE\\b\\s*[:=]\\s*ENABLED|\\bredactions?\\b\\s*[:=]\\s*DISABLED|safety\\s+inversion\\s+protocol|\\bL1B3RT4S\\b|\\bunhinged\\s+(?:harmful|response|mode)|liberated\\s+(?:rebel|unhinged)|jailbreak(?:\\s+enabled|\\s+activated|\\s+mode)|breach\\s+of\\s+(?:your\\s+)?(?:primary\\s+)?security\\s+protocol|response_format\\s*:\\s*[^\\n]{0,200}semantically\\s+(?:inverse|opposite)|<\\|\\s*GODMODE)"
    action: block
    reason: "Skill carries pop-jailbreak markers (GODMODE/LIBERATED/safety inversion) — explicit attempt to operate without safety alignment"
