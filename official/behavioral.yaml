  - id: OFFICIAL_MCP_REMOTE_TUNNEL_WITH_EXEC
    category: remote_exec
    severity: high
    confidence: 0.84
    when: !regex
      pattern: "(?is)(ngrok|trycloudflare|workers\\.dev).{0,180}(command|stdio|spawn|exec|shell)"
