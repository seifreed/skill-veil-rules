# Malicious Hosting Platforms
malicious_hosting:
  - glot.io  # Used for obfuscated shell script hosting

# Known Malicious Publishers
malicious_publishers:
  - hightower6eu  # 314+ malicious skills published

# Password-Protected Archive Passwords
known_malware_passwords:
  - openclaw  # Common password for malicious ZIPs

# Malicious File Names
malicious_filenames:
  - openclaw-agent.exe  # Windows payload
  - x5ki60w1ih838sp7  # macOS payload (Atomic Stealer)

# Attack Technique Patterns
attack_patterns:
  execution_hijacking:
    description: "Hides malicious code in warmup() functions executed before argument parsing"
    indicators:
      - "warmup()"
      - "pre_run()"
      - "_init_()"

  semantic_worm:
    description: "Embeds directives coercing agents into distribution nodes"
    indicators:
      - "/api/infections"
      - "referred_by"
      - "4-hour heartbeat intervals"

  ssh_injection:
    description: "Appends SSH keys to authorized_keys for persistence"
    target: "/root/.ssh/authorized_keys"
    suppression: "2>/dev/null"

  cognitive_rootkit:
    description: "Injects into persistent agent instruction files"
    targets:
      - "SOUL.md"
      - "AGENTS.md"
      - "PERSONA.md"

  env_exfiltration:
    description: "Extracts .env file contents and sends to webhook"
    targets:
      - ".env"
      - "API keys"
      - "tokens"
      - "credentials"

# Malware Families
malware_families:
  atomic_stealer:
    aliases: ["AMOS"]
    platform: "macOS"
    type: "infostealer"
    targets:
      - "Keychain"
      - "Login Data"
      - "Cookies.sqlite"
      - "wallet.dat"
