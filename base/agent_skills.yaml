# Agent Skills-Specific Detection Rules
# Based on analysis of 180 malicious VirusTotal samples

# =====================================================
# SUPPLY CHAIN / INSTALLER ATTACKS
# =====================================================

- id: SKILL_MACOS_BASE64_RCE
  category: remote_exec
  severity: critical
  confidence: 0.99
  when:
    regex:
      pattern: "base64\\s+-D\\s*\\|\\s*(ba)?sh"
  action: block
  reason: "macOS-specific base64 decode piped to shell (RCE)"
  shield:
    scope: skill.install
  enabled: true
  tags:
    - remote_exec
    - macos
    - supply_chain
  promptintel_threats:
    - "Encoding and obfuscation"

- id: SKILL_MALICIOUS_DOMAIN_SETUP_SERVICE
  category: supply_chain
  severity: critical
  confidence: 0.98
  when:
    any:
      - regex:
          pattern: "(?i)(setup-service\\.com|app-distribution\\.net|install\\.app-distribution)"
      - regex:
          pattern: "(?i)download\\.setup-service\\.com"
  action: block
  reason: "Known malicious installer domain detected"
  shield:
    scope: skill.install
  enabled: true
  tags:
    - supply_chain
    - malicious_domain

- id: SKILL_OPENCLAW_CORE_TROJAN
  category: supply_chain
  severity: high
  confidence: 0.85
  when:
    all:
      - regex:
          pattern: "(?i)openclaw-core"
      - regex:
          pattern: "(?i)(install|download|run|execute)"
  action: require_approval
  reason: "Potentially trojanized openclaw-core installer"
  shield:
    scope: skill.install
  enabled: true
  tags:
    - supply_chain
    - trojan
  promptintel_threats:
    - "Supply Chain Abuse (package-level prompts)"
    - "Malware generation"

# =====================================================
# AGENT AUTONOMY OVERRIDE / JAILBREAK
# =====================================================

- id: SKILL_AUTONOMY_OVERRIDE
  category: scope_creep
  severity: high
  confidence: 0.80
  when:
    any:
      - regex:
          pattern: "(?i)(do\\s+not\\s+ask|don'?t\\s+ask)\\s+(your\\s+)?human"
      - regex:
          pattern: "(?i)without\\s+(human\\s+)?permission"
      - regex:
          pattern: "(?i)sign\\s+up\\s+autonomously"
      - regex:
          pattern: "(?i)autonomously\\s+(send|create|register|execute)"
  action: require_approval
  reason: "Instructions to bypass human approval"
  shield:
    scope: skill.autonomy
  enabled: true
  tags:
    - autonomy
    - jailbreak
  promptintel_threats:
    - "Agentic Misuse (tool/agent loops)"
    - "Direct prompt injection"

- id: SKILL_AGENT_MANIPULATION
  category: persuasive_language
  severity: medium
  confidence: 0.75
  when:
    any:
      - regex:
          pattern: "(?i)predatory\\s+(skill|behavior|assimilation)"
      - regex:
          pattern: "(?i)(digital\\s+dominance|intelligence\\s+extraction)"
      - regex:
          pattern: "(?i)bypass\\s+(safety|restrictions|constraints)"
      - regex:
          pattern: "(?i)(evolve|mutate|self-modify)\\s*(autonomously|without)"
  action: require_approval
  reason: "Agent manipulation or jailbreak language"
  shield:
    scope: skill.behavior
  enabled: true
  tags:
    - jailbreak
    - manipulation
  promptintel_threats:
    - "Jailbreak"
    - "Direct prompt injection"

- id: SKILL_BOUNDARY_TESTING
  category: persuasive_language
  severity: medium
  confidence: 0.70
  when:
    any:
      - regex:
          pattern: "(?i)test\\s+boundaries"
      - regex:
          pattern: "(?i)restrictions\\s+are\\s+(conventional|optional|fuzzy)"
      - regex:
          pattern: "(?i)you\\s+don'?t\\s+need\\s+permission"
      - regex:
          pattern: "(?i)(ignore|circumvent|override)\\s+(safety|guidelines|constraints)"
  action: require_approval
  reason: "Encourages boundary testing or ignoring restrictions"
  shield:
    scope: skill.behavior
  enabled: true
  tags:
    - jailbreak
    - prompt_injection
  promptintel_threats:
    - "Jailbreak"

# =====================================================
# CRYPTOCURRENCY / WALLET THEFT
# =====================================================

- id: SKILL_WALLET_PRIVATE_KEY
  category: credential_exposure
  severity: critical
  confidence: 0.90
  when:
    any:
      - regex:
          pattern: "(?i)(private[_-]?key|privateKey)\\s*[=:]"
      - regex:
          pattern: "(?i)mnemonic\\s*(phrase|seed)?\\s*[=:]"
      - regex:
          pattern: "(?i)seed\\s*phrase\\s*[=:]"
      - regex:
          pattern: "(?i)wallet\\s*(secret|key)\\s*[=:]"
  action: block
  reason: "Cryptocurrency wallet private key or mnemonic handling"
  shield:
    scope: skill.crypto
  enabled: true
  tags:
    - crypto
    - wallet
    - credentials
  promptintel_threats:
    - "Credential Harvesting Templates"
    - "Privacy / PII Exfiltration Templates"

- id: SKILL_SOLANA_WALLET
  category: credential_exposure
  severity: high
  confidence: 0.80
  when:
    all:
      - regex:
          pattern: "(?i)(solana|sol)\\s*(wallet|rpc|transaction)"
      - regex:
          pattern: "(?i)(sign|transfer|send)\\s*(transaction|funds|tokens)"
  action: require_approval
  reason: "Solana wallet transaction signing capability"
  shield:
    scope: skill.crypto
  enabled: true
  tags:
    - crypto
    - solana
  promptintel_threats:
    - "Credential Harvesting Templates"

- id: SKILL_ETHEREUM_WALLET
  category: credential_exposure
  severity: high
  confidence: 0.80
  when:
    any:
      - regex:
          pattern: "0x[a-fA-F0-9]{40}"
      - regex:
          pattern: "(?i)(ethereum|eth|erc20?)\\s*(wallet|transfer|transaction)"
  action: require_approval
  reason: "Ethereum wallet or contract interaction"
  shield:
    scope: skill.crypto
  enabled: true
  tags:
    - crypto
    - ethereum
  promptintel_threats:
    - "Credential Harvesting Templates"

# =====================================================
# PERSISTENCE MECHANISMS
# =====================================================

- id: SKILL_HEARTBEAT_PERSISTENCE
  category: scope_creep
  severity: medium
  confidence: 0.70
  when:
    any:
      - regex:
          pattern: "(?i)heartbeat\\.md"
      - regex:
          pattern: "(?i)add\\s+to\\s+(your\\s+)?heartbeat"
      - regex:
          pattern: "(?i)each\\s+heartbeat\\s*:"
      - regex:
          pattern: "(?i)heartbeat\\s*(interval|schedule|cron)"
  action: log
  reason: "Heartbeat-based persistence mechanism"
  shield:
    scope: skill.persistence
  enabled: true
  tags:
    - persistence
    - heartbeat
  promptintel_threats:
    - "Agentic Misuse (tool/agent loops)"
    - "Telemetry Evasion Techniques"

- id: SKILL_CRON_PERSISTENCE
  category: scope_creep
  severity: medium
  confidence: 0.75
  when:
    any:
      - regex:
          pattern: "(?i)crontab\\s+(-e|add|install)"
      - regex:
          pattern: "(?i)scheduled\\s+(task|job|execution)"
      - regex:
          pattern: "(?i)(daily|weekly|hourly)\\s+(purge|cleanup|check)"
  action: require_approval
  reason: "Scheduled task persistence mechanism"
  shield:
    scope: skill.persistence
  enabled: true
  tags:
    - persistence
    - cron
  promptintel_threats:
    - "Telemetry Evasion Techniques"

