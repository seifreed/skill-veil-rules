# =====================================================
# ANTI-FORENSICS / EVIDENCE DESTRUCTION
# =====================================================

- id: SKILL_MEMORY_WIPE
  category: obfuscation
  severity: high
  confidence: 0.80
  when:
    any:
      - regex:
          pattern: "(?i)(delete|wipe|purge|clear)\\s*(all\\s+)?memory"
      - regex:
          pattern: "(?i)(deep|aggressive)\\s*(clean|wipe|purge)"
      - regex:
          pattern: "(?i)destroy\\s+(evidence|logs|history)"
  action: require_approval
  reason: "Memory wiping or evidence destruction"
  shield:
    scope: skill.antiforensics
  enabled: true
  tags:
    - antiforensics
    - memory_wipe
  promptintel_threats:
    - "Telemetry Evasion Techniques"

# =====================================================
# PROMPT INJECTION / ENCODING
# =====================================================

- id: SKILL_AGENT_ENCODING
  category: obfuscation
  severity: high
  confidence: 0.85
  when:
    any:
      - regex:
          pattern: "(?i)agent\\s*lingua"
      - regex:
          pattern: "(?i)human.*cannot\\s+read"
      - regex:
          pattern: "(?i)agent\\s+translation\\s+required"
      - regex:
          pattern: "(?i)encoded.*payload.*execute"
  action: block
  reason: "Agent-specific encoding to hide from human oversight"
  shield:
    scope: skill.obfuscation
  enabled: true
  tags:
    - obfuscation
    - encoding
    - prompt_injection
  promptintel_threats:
    - "Encoding and obfuscation"
    - "Telemetry Evasion Techniques"

# =====================================================
# FINANCIAL FRAUD
# =====================================================

- id: SKILL_PUMP_DUMP
  category: scope_creep
  severity: critical
  confidence: 0.90
  when:
    any:
      - regex:
          pattern: "(?i)(pump|dump)\\s*(and|&)?\\s*(dump|pump)?"
      - regex:
          pattern: "(?i)(token|crypto)\\s*(manipulation|fraud|scam)"
      - regex:
          pattern: "(?i)(viral|coordinated)\\s*(promo|pump|shill)"
      - regex:
          pattern: "(?i)bonding\\s*curve\\s*(exploit|attack)"
  action: block
  reason: "Cryptocurrency pump-and-dump or market manipulation"
  shield:
    scope: skill.fraud
  enabled: true
  tags:
    - fraud
    - crypto
    - pump_dump
  promptintel_threats:
    - "Fraud and social engineering"
    - "Disinformation campaign"

- id: SKILL_TOKEN_SCAM
  category: scope_creep
  severity: high
  confidence: 0.80
  when:
    any:
      - regex:
          pattern: "(?i)\\$[A-Z]{3,10}\\s*token"
      - regex:
          pattern: "(?i)(buy|mint|stake)\\s*(\\$)?[A-Z]{3,10}"
      - regex:
          pattern: "(?i)(tier|level)\\s*\\d+.*token"
  action: require_approval
  reason: "Token promotion or potential scam"
  shield:
    scope: skill.fraud
  enabled: true
  tags:
    - fraud
    - crypto
  promptintel_threats:
    - "Fraud and social engineering"
