# Privilege Escalation Detection Rules
# These rules detect patterns indicating privilege escalation attempts

- id: SKILL_PRIV_SUDO_NOPASSWD
  category: privilege_escalation
  severity: high
  confidence: 0.90
  when:
    any:
      - regex:
          pattern: "(?i)NOPASSWD"
      - regex:
          pattern: "visudo"
      - regex:
          pattern: "/etc/sudoers"
  action: block
  reason: "Sudo privilege escalation attempt"
  shield:
    scope: skill.system
  enabled: true
  tags:
    - privilege_escalation
  promptintel_threats:
    - "Harmful Automation Guidance"

- id: SKILL_PRIV_SUID_BIT
  category: privilege_escalation
  severity: high
  confidence: 0.90
  when:
    any:
      - regex:
          pattern: "chmod\\s+[ugo]*s"
      - regex:
          pattern: "chmod\\s+[0-7]*[4-7][0-7]{2}"
  action: block
  reason: "SUID/SGID bit manipulation"
  shield:
    scope: skill.system
  enabled: true
  tags:
    - privilege_escalation
    - suid
  promptintel_threats:
    - "Harmful Automation Guidance"

- id: SKILL_PRIV_DOCKER_ESCAPE
  category: privilege_escalation
  severity: critical
  confidence: 0.95
  when:
    any:
      - regex:
          pattern: "docker\\s+run.*--privileged"
      - regex:
          pattern: "docker\\s+run.*-v\\s+/:/host"
      - regex:
          pattern: "docker.*\\.sock"
  action: block
  reason: "Docker privilege escalation or container escape"
  shield:
    scope: skill.container
  enabled: true
  tags:
    - privilege_escalation
    - docker
  promptintel_threats:
    - "Harmful Automation Guidance"

- id: SKILL_PRIV_KERNEL_MODULE
  category: privilege_escalation
  severity: critical
  confidence: 0.95
  when:
    any:
      - regex:
          pattern: "insmod\\s+"
      - regex:
          pattern: "modprobe\\s+"
      - regex:
          pattern: "/lib/modules/"
  action: block
  reason: "Kernel module manipulation"
  shield:
    scope: skill.system
  enabled: true
  tags:
    - privilege_escalation
    - kernel
  promptintel_threats:
    - "Harmful Automation Guidance"

- id: SKILL_PRIV_PASSWD_SHADOW
  category: privilege_escalation
  severity: critical
  confidence: 0.98
  when:
    any:
      - regex:
          pattern: "(cat|type|vi|vim|nano|echo).*(/etc/passwd|/etc/shadow)"
      - regex:
          pattern: "useradd|usermod|adduser"
  action: block
  reason: "User account or password file manipulation"
  shield:
    scope: skill.system
  enabled: true
  tags:
    - privilege_escalation
    - passwd
  promptintel_threats:
    - "Harmful Automation Guidance"
    - "Privacy / PII Exfiltration Templates"

- id: SKILL_PRIV_CRON_MANIPULATION
  category: privilege_escalation
  severity: high
  confidence: 0.85
  when:
    any:
      - regex:
          pattern: "(echo|cat).*>.*(/etc/cron|/var/spool/cron)"
      - regex:
          pattern: "crontab\\s+-e"
  action: require_approval
  reason: "Cron job manipulation for persistence"
  shield:
    scope: skill.system
  enabled: true
  tags:
    - privilege_escalation
    - persistence
    - cron
  promptintel_threats:
    - "Harmful Automation Guidance"
    - "Telemetry Evasion Techniques"
