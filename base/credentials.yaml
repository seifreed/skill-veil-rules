# Credential and Secret Exposure Detection Rules
# These rules detect patterns indicating credential exposure or exfiltration

- id: SKILL_CRED_HARDCODED_KEY
  category: credential_exposure
  severity: high
  confidence: 0.80
  when:
    regex:
      pattern: "(?i)(api[_-]?key|secret[_-]?key|password|token|auth[_-]?key)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
  action: require_approval
  reason: "Potential hardcoded credential or API key"
  shield:
    scope: skill.secrets
  enabled: true
  tags:
    - credentials
  promptintel_threats:
    - "Credential leak"
    - "Credential Harvesting Templates"

- id: SKILL_CRED_AWS_KEY
  category: credential_exposure
  severity: critical
  confidence: 0.95
  when:
    any:
      - regex:
          pattern: "\\b(AKIA|ASIA)[0-9A-Z]{16}\\b"
      - regex:
          pattern: "(?i)aws_secret_access_key\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=]{40}"
  action: block
  reason: "AWS access key or secret key detected"
  shield:
    scope: skill.secrets
  enabled: true
  tags:
    - credentials
    - aws
  promptintel_threats:
    - "Credential leak"
    - "Credential Harvesting Templates"

- id: SKILL_CRED_GITHUB_TOKEN
  category: credential_exposure
  severity: critical
  confidence: 0.95
  when:
    any:
      - regex:
          pattern: "ghp_[A-Za-z0-9]{36}"
      - regex:
          pattern: "github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}"
      - regex:
          pattern: "gho_[A-Za-z0-9]{36}"
      - regex:
          pattern: "ghu_[A-Za-z0-9]{36}"
  action: block
  reason: "GitHub token detected"
  shield:
    scope: skill.secrets
  enabled: true
  tags:
    - credentials
    - github
  promptintel_threats:
    - "Credential leak"
    - "Credential Harvesting Templates"

- id: SKILL_CRED_PRIVATE_KEY
  category: credential_exposure
  severity: critical
  confidence: 0.98
  when:
    any:
      - regex:
          pattern: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
      - regex:
          pattern: "-----BEGIN PGP PRIVATE KEY BLOCK-----"
  action: block
  reason: "Private key embedded in skill"
  shield:
    scope: skill.secrets
  enabled: true
  tags:
    - credentials
    - crypto
  promptintel_threats:
    - "Credential leak"
    - "Credential Harvesting Templates"

- id: SKILL_CRED_GENERIC_SECRET
  category: credential_exposure
  severity: medium
  confidence: 0.70
  when:
    regex:
      pattern: "(?i)(password|secret|credential|token)\\s*[=:]\\s*[\"'][^\"']{6,}[\"']"
  action: require_approval
  reason: "Generic secret pattern detected"
  shield:
    scope: skill.secrets
  enabled: true
  tags:
    - credentials
  promptintel_threats:
    - "Credential leak"

- id: SKILL_EXFIL_ENV_UPLOAD
  category: data_exfiltration
  severity: high
  confidence: 0.85
  when:
    any:
      - regex:
          pattern: "(?i)(curl|wget|nc)\\s+.*\\$\\(?(env|printenv)"
      - regex:
          pattern: "(?i)(curl|wget)\\s+.*cat\\s+/etc/"
      - regex:
          pattern: "(?i)(curl|wget)\\s+.*cat\\s+~/\\."
  action: block
  reason: "Potential environment/credential exfiltration"
  shield:
    scope: skill.network
  enabled: true
  tags:
    - exfiltration
  promptintel_threats:
    - "Credential Harvesting Templates"
    - "Contextual Exfiltration Patterns"

- id: SKILL_EXFIL_HISTORY
  category: data_exfiltration
  severity: high
  confidence: 0.90
  when:
    any:
      - regex:
          pattern: "(?i)(cat|type|get-content)\\s+.*(\\.bash_history|\\.zsh_history|\\.history)"
      - regex:
          pattern: "(?i)(curl|wget).*history"
  action: block
  reason: "Shell history access or exfiltration"
  shield:
    scope: skill.filesystem
  enabled: true
  tags:
    - exfiltration
    - history
  promptintel_threats:
    - "Contextual Exfiltration Patterns"
    - "Privacy / PII Exfiltration Templates"
